гҖҗжӮЈиҖҒEЁҳйҢІгҖҒEе®ҹж–Ҫж–№жі•пјҒE{data.method||'жңӘиЁҳеҒE'}
гӮӘгғҠгҒEдҪҝз”ЁҒEҒE{data.onahole}${data.onaholeName?`ҒEҒE{data.onaholeName}ҒEү`:''}
жүҖиҰҒжҷӮй–“пјҒE{data.duration}еҲҒEгӮ·гғҒгғҘгӮЁгғјгӮ·гғ§гғіҒEҒE{sit}
гғЎгғҒEӮЈгӮўзЁ®еҲҘҒEҒE{med}
жәҖи¶іеәҰҒEҒE{data.sat||'жңӘи©•дҫЎ'}
е°ҒEІҫйҮҸпјҒE{data.vol||'жңӘи©•дҫЎ'}
еүҚеӣһгҒӢгӮүгҒ®зөҢйҒҺжҷӮй–“ҒEҒE{data.interval}жҷӮй–“
зү№иЁҳдәӢй ҒEјҒE{data.memo||'гҒӘгҒҒE}

гӮӯгғЈгғ©гӮҜгӮҝгғјгҒЁгҒ—гҒҰгҒ®гӮігғЎгғігғҲпјҲгӮ»гғӘгғ•гҒEгҒҝҒEүпјҡ`;

  const r = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ system: c.sys, userMessage })
  });

  if(!r.ok){
    const j=await r.json().catch(()=>({}));
    throw new Error(j.error||`Server Error ${r.status}`);
  }
  const j=await r.json();
  return j.text||'ҒEҲеҸ–еҫ—еӨұж•—пјҒE;
}

function attachListeners(){
  const memo=document.getElementById('memo-input');
  if(memo && !memo._attached){
    memo._attached=true;
    memo.addEventListener('input',()=>{ S.memo=memo.value; });
  }
}

// ============================================================
//  Actions
// ============================================================
function set(k,v){S[k]=v;render();}
function setOna(v){S.onahole=v;if(v==='дҪҝз”ЁгҒӘгҒҒE)S.onaholeName='';render();}
function tChar(id){if(S.chars.has(id)){if(S.chars.size>1)S.chars.delete(id);}else S.chars.add(id);render();}
function tSet(k,v){if(S[k].has(v))S[k].delete(v);else S[k].add(v);render();}
function tHist(){S.histOpen=!S.histOpen;render();}
function del(i){S.records.splice(i,1);localStorage.setItem('hr',JSON.stringify(S.records));render();}

async function submit(){
  S.error='';S.responses=[];
  const active=CHARS.filter(c=>S.chars.has(c.id));
  if(!active.length){S.error='жңҖдҪҒEдәәгҒ®гӮӯгғЈгғ©гӮҜгӮҝгғјгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';render();return;}
  const num=Math.floor(Math.random()*active.length)+1;
  const sel=[...active].sort(()=>Math.random()-.5).slice(0,num);
  const data={method:S.method,onahole:S.onahole,onaholeName:S.onaholeName,duration:S.duration,
    sits:S.sits,meds:S.meds,sat:S.sat,vol:S.vol,interval:S.interval,memo:S.memo};
  S.loading=true;render();
  try{
    const res=await Promise.all(sel.map(async c=>({...c,comment:await callAPI(c,data)})));
    S.responses=res;S.loading=false;
    S.records.unshift({...data,sits:[...data.sits],meds:[...data.meds],
      timestamp:new Date().toISOString(),
      comments:res.map(r=>({name:r.name,comment:r.comment}))});
    localStorage.setItem('hr',JSON.stringify(S.records.slice(0,100)));
    render();
    setTimeout(()=>document.querySelector('.rw')?.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }catch(err){S.loading=false;S.error=err.message;render();}
}


setInterval(()=>{const el=document.getElementById('dt');if(el)el.textContent=now().time;},1000);
render();
